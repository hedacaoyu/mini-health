name: Compile DC-HealthKit xcframework

on:
  workflow_dispatch:
  push:
    paths:
      - 'nativeplugins/DC-HealthKit/ios/**'
      - '.github/workflows/build-plugin.yml'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      # ── 1. 获取真实 DCUniModule.h ──────────────────────────────────
      - name: Download HBuilderX 5.07 iOS SDK headers
        working-directory: nativeplugins/DC-HealthKit/ios
        run: |
          FOUND=false
          for URL in \
            "https://img.cdn.aliyun.dcloud.net.cn/nativedocs/5.07/iOSSDK.zip" \
            "https://img.cdn.aliyun.dcloud.net.cn/nativedocs/5.0.7/iOSSDK.zip"; do
            echo "Trying: $URL"
            if curl -fL --connect-timeout 30 --max-time 180 "$URL" -o /tmp/sdk.zip 2>/dev/null \
               && file /tmp/sdk.zip | grep -qiE "zip|archive"; then
              unzip -q /tmp/sdk.zip -d /tmp/sdk/
              HEADER=$(find /tmp/sdk -name "DCUniModule.h" 2>/dev/null | head -1)
              if [ -n "$HEADER" ]; then
                cp "$HEADER" DCUniModule.h
                echo "✅ Real DCUniModule.h found: $HEADER"
                FOUND=true
                break
              fi
            fi
          done
          if [ "$FOUND" = "false" ]; then
            echo "⚠️  SDK download failed — using stub (methods may not export correctly)"
          fi

      # ── 2. 用 xcodeproj gem 生成真正的 Xcode 工程 ─────────────────
      - name: Generate Xcode project
        working-directory: nativeplugins/DC-HealthKit/ios
        run: |
          gem install xcodeproj --no-document --quiet

          ruby << 'RUBY'
          require 'xcodeproj'

          proj = Xcodeproj::Project.new('DCHealthKit.xcodeproj')
          target = proj.new_target(:framework, 'DCHealthKit', :ios, '13.0')

          grp = proj.main_group.new_group('Sources')

          # 源文件
          m = grp.new_file('DCHealthKitModule.m')
          target.source_build_phase.add_file_reference(m)

          # 头文件（public）
          ['DCHealthKitModule.h', 'DCUniModule.h'].each do |h|
            ref = grp.new_file(h)
            entry = target.headers_build_phase.add_file_reference(ref)
            entry.settings = { 'ATTRIBUTES' => ['Public'] }
          end

          # 链接 HealthKit.framework
          fmwk = proj.frameworks_group.new_file(
            'System/Library/Frameworks/HealthKit.framework'
          )
          target.frameworks_build_phase.add_file_reference(fmwk)

          # Build settings
          target.build_configuration_list.build_configurations.each do |c|
            s = c.build_settings
            s['IPHONEOS_DEPLOYMENT_TARGET']  = '13.0'
            s['MACH_O_TYPE']                 = 'staticlib'   # 静态 framework
            s['DEFINES_MODULE']              = 'YES'
            s['BUILD_LIBRARY_FOR_DISTRIBUTION'] = 'YES'
            s['SKIP_INSTALL']                = 'NO'
            s['CLANG_ENABLE_MODULES']        = 'YES'
            s['CLANG_ENABLE_OBJC_ARC']       = 'YES'
            s['HEADER_SEARCH_PATHS']         = ['$(SRCROOT)', '$(inherited)']
            s['PRODUCT_NAME']                = 'DCHealthKit'
          end

          proj.save
          puts '✅ Xcode project generated: DCHealthKit.xcodeproj'
          RUBY

      # ── 3. 编译 archive（device + simulator）─────────────────────
      - name: Build device archive
        working-directory: nativeplugins/DC-HealthKit/ios
        run: |
          xcodebuild archive \
            -project DCHealthKit.xcodeproj \
            -scheme DCHealthKit \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/DCHealthKit-iphoneos.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            2>&1 | grep -E "error:|warning:|BUILD|archive"

      - name: Build simulator archive
        working-directory: nativeplugins/DC-HealthKit/ios
        run: |
          xcodebuild archive \
            -project DCHealthKit.xcodeproj \
            -scheme DCHealthKit \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -archivePath /tmp/DCHealthKit-iphonesimulator.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            2>&1 | grep -E "error:|warning:|BUILD|archive"

      # ── 4. 合并为 xcframework ─────────────────────────────────────
      - name: Create xcframework
        working-directory: nativeplugins/DC-HealthKit/ios
        run: |
          FW_DEV=$(find /tmp/DCHealthKit-iphoneos.xcarchive \
            -name "DCHealthKit.framework" | head -1)
          FW_SIM=$(find /tmp/DCHealthKit-iphonesimulator.xcarchive \
            -name "DCHealthKit.framework" | head -1)

          echo "Device fw : $FW_DEV"
          echo "Simulator fw: $FW_SIM"

          rm -rf DC-HealthKit.xcframework

          xcodebuild -create-xcframework \
            -framework "$FW_DEV" \
            -framework "$FW_SIM" \
            -output DC-HealthKit.xcframework

          echo "✅ xcframework contents:"
          find DC-HealthKit.xcframework -type f | sort

      # ── 5. 上传 artifact ──────────────────────────────────────────
      - name: Upload DC-HealthKit.xcframework
        uses: actions/upload-artifact@v4
        with:
          name: DC-HealthKit-xcframework-${{ github.sha }}
          path: nativeplugins/DC-HealthKit/ios/DC-HealthKit.xcframework
          retention-days: 30
          if-no-files-found: error

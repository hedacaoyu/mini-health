name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      # ── 1. 下载 HBuilderX 5.07 iOS 离线 SDK ───────────────────────
      - name: Download HBuilderX iOS SDK
        run: |
          echo "Downloading SDK..."
          curl -L --progress-bar \
            "https://img.cdn.aliyun.dcloud.net.cn/nativedocs/5.07/iOSSDK.zip" \
            -o /tmp/iOSSDK.zip

          if file /tmp/iOSSDK.zip | grep -qiE "zip|archive"; then
            echo "✅ SDK downloaded ($(du -sh /tmp/iOSSDK.zip | cut -f1))"
            unzip -q /tmp/iOSSDK.zip -d /tmp/HBX-SDK/
            echo ""
            echo "=== SDK 内容 ==="
            ls /tmp/HBX-SDK/
          else
            echo "❌ 下载失败，文件内容："
            head -3 /tmp/iOSSDK.zip
            exit 1
          fi

      # ── 2. 找到 Xcode 工程，复制 App 资源 ─────────────────────────
      - name: Setup project with app resources
        run: |
          # 找 Xcode 工程
          XCWORKSPACE=$(find /tmp/HBX-SDK -name "*.xcworkspace" | head -1)
          XCODEPROJ=$(find /tmp/HBX-SDK -name "*.xcodeproj" | head -1)
          PROJ_DIR=$(dirname "${XCWORKSPACE:-$XCODEPROJ}")

          echo "WorkSpace : $XCWORKSPACE"
          echo "Project   : $XCODEPROJ"
          echo "Dir       : $PROJ_DIR"
          echo ""
          echo "=== 工程目录结构 ==="
          find "$PROJ_DIR" -maxdepth 3 -not -path "*/Pods/*" | head -40

          # 复制 HBuilderX 生成的 App 资源
          WWW=$(find "$PROJ_DIR" -name "www" -type d | head -1)
          if [ -n "$WWW" ] && [ -d "unpackage/resources/__UNI__6053451" ]; then
            cp -r unpackage/resources/__UNI__6053451/. "$WWW/"
            echo "✅ App 资源已复制到 $WWW"
          else
            echo "⚠️  www 目录: $WWW"
            echo "⚠️  App 资源: $(ls unpackage/resources/ 2>/dev/null || echo '未找到')"
          fi

          # 保存路径供后续步骤使用
          echo "XCWORKSPACE=$XCWORKSPACE" >> $GITHUB_ENV
          echo "XCODEPROJ=$XCODEPROJ" >> $GITHUB_ENV
          echo "PROJ_DIR=$PROJ_DIR" >> $GITHUB_ENV

      # ── 3. 添加 HealthKit 原生插件到 Xcode 工程 ───────────────────
      - name: Integrate DC-HealthKit plugin
        run: |
          gem install xcodeproj --no-document --quiet

          ruby << 'RUBY'
          require 'xcodeproj'

          proj_path = ENV['XCODEPROJ']
          unless proj_path && File.exist?(proj_path)
            puts "❌ xcodeproj not found at: #{proj_path}"
            exit 1
          end

          proj   = Xcodeproj::Project.open(proj_path)
          target = proj.targets.first
          puts "Target: #{target.name}"

          # 复制插件源码到工程目录
          plugin_src = File.join(Dir.pwd, 'nativeplugins/DC-HealthKit/ios')
          plugin_dst = File.join(File.dirname(proj_path), 'DC-HealthKit')
          FileUtils.mkdir_p(plugin_dst)

          %w[DCHealthKitModule.h DCHealthKitModule.m DCUniModule.h].each do |f|
            src = File.join(plugin_src, f)
            dst = File.join(plugin_dst, f)
            FileUtils.cp(src, dst) if File.exist?(src)
            puts "Copied: #{f}"
          end

          # 加入工程
          grp = proj.main_group.find_subpath('DC-HealthKit', true)
          grp.set_source_tree('<group>')
          grp.set_path(plugin_dst)

          %w[DCHealthKitModule.h DCHealthKitModule.m DCUniModule.h].each do |f|
            ref = grp.new_file(f)
            target.source_build_phase.add_file_reference(ref) if f.end_with?('.m')
          end

          # 链接 HealthKit.framework
          fmwk = proj.frameworks_group.new_file(
            'System/Library/Frameworks/HealthKit.framework'
          )
          target.frameworks_build_phase.add_file_reference(fmwk)

          # Header search path
          target.build_configuration_list.build_configurations.each do |c|
            paths = Array(c.build_settings['HEADER_SEARCH_PATHS'])
            paths << '$(SRCROOT)/DC-HealthKit' unless paths.include?('$(SRCROOT)/DC-HealthKit')
            c.build_settings['HEADER_SEARCH_PATHS'] = paths
          end

          proj.save
          puts "✅ Plugin integrated"
          RUBY

      # ── 4. 导入证书和描述文件 ──────────────────────────────────────
      - name: Import signing assets
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          # Keychain
          security create-keychain -p "ci1234" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci1234" ci.keychain
          security set-keychain-settings -t 3600 -u ci.keychain

          # 证书
          echo "$IOS_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k ci.keychain -P "$IOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "ci1234" ci.keychain

          # 描述文件
          echo "$IOS_PROVISION_BASE64" | base64 --decode > /tmp/app.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          UUID=$(grep -a 'UUID' /tmp/app.mobileprovision | \
                 grep -oE '[A-F0-9-]{36}' | head -1)
          cp /tmp/app.mobileprovision \
             ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "✅ Profile UUID: $UUID"

      # ── 5. Archive ────────────────────────────────────────────────
      - name: Archive
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          BUILD_CMD=""
          if [ -n "$XCWORKSPACE" ] && [ -f "$XCWORKSPACE/contents.xcworkspacedata" ]; then
            BUILD_CMD="-workspace $XCWORKSPACE"
          else
            BUILD_CMD="-project $XCODEPROJ"
          fi

          SCHEME=$(xcodebuild -list $BUILD_CMD 2>/dev/null | \
                   awk '/Schemes:/{f=1;next} f&&NF{print;exit}' | xargs)
          echo "Scheme: $SCHEME"

          xcodebuild archive \
            $BUILD_CMD \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/mini-health.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | grep -E "error:|warning: .*error|BUILD SUCCEEDED|BUILD FAILED|Signing"

      # ── 6. 导出 IPA ────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/mini-health.xcarchive \
            -exportPath /tmp/ipa-output/ \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            2>&1 | grep -E "error:|Export|\.ipa"

          echo "=== IPA 文件 ==="
          find /tmp/ipa-output -name "*.ipa" -exec ls -lh {} \;

      # ── 7. 上传 IPA ────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-health-ipa-${{ github.sha }}
          path: /tmp/ipa-output/*.ipa
          retention-days: 7
          if-no-files-found: error
